<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NullPointer — поиск цен</title>
  <link rel="stylesheet" href="/styles.css?v=20260523-4" />
</head>
<body>
  <header class="topbar">
    <h1>NullPointer · поиск товаров по маркетплейсам</h1>
    <p class="subtitle">Baseline для Tender Hack — Yandex Market · Ozon · Wildberries · Citilink</p>
  </header>

  <main>
    <form id="search-form" class="search-form">
      <div class="field grow">
        <label for="query">Запрос</label>
        <input id="query" name="query" type="text" placeholder="например: футболка хлопок мужская" required />
      </div>
      <div class="field">
        <label for="region">Регион</label>
        <input id="region" name="region" type="text" value="Москва" list="region-options" autocomplete="off" />
        <datalist id="region-options">
          <option value="Москва"></option>
          <option value="Санкт-Петербург"></option>
          <option value="Вологда"></option>
          <option value="Волгоград"></option>
          <option value="Казань"></option>
          <option value="Новосибирск"></option>
          <option value="Екатеринбург"></option>
          <option value="Нижний Новгород"></option>
          <option value="Краснодар"></option>
          <option value="Ростов-на-Дону"></option>
          <option value="Самара"></option>
          <option value="Уфа"></option>
          <option value="Челябинск"></option>
          <option value="Омск"></option>
          <option value="Пермь"></option>
          <option value="Воронеж"></option>
          <option value="Саратов"></option>
          <option value="Тюмень"></option>
          <option value="Ижевск"></option>
          <option value="Барнаул"></option>
          <option value="Владивосток"></option>
          <option value="Ярославль"></option>
          <option value="Тула"></option>
          <option value="Рязань"></option>
          <option value="Калуга"></option>
          <option value="Тверь"></option>
          <option value="Смоленск"></option>
          <option value="Курск"></option>
          <option value="Белгород"></option>
          <option value="Минск"></option>
          <option value="Могилёв"></option>
        </datalist>
      </div>
      <button type="submit" id="submit-btn">Искать</button>
    </form>

    <section id="normalization" class="normalization hidden">
      <h2>Нормализация запроса</h2>
      <dl>
        <dt>Исходный</dt><dd id="n-raw"></dd>
        <dt>Исправленный</dt><dd id="n-corrected"></dd>
        <dt>Синонимы</dt><dd id="n-synonyms"></dd>
        <dt>Расширенные запросы</dt><dd id="n-expanded"></dd>
      </dl>
    </section>

    <section id="results"></section>

    <p id="status-line" class="status-line"></p>
  </main>

  <script src="/app.js?v=20260523-4"></script>
</body>
</html>
